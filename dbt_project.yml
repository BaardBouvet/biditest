name: 'biditest'
version: '1.0.0'
config-version: 2

profile: 'biditest'

model-paths:  ["models"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]
test-paths:   ["tests"]
target-path:  "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  biditest:
    +schema: raw

models:
  biditest:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
