# profiles.yml — dbt connection profile for the biditest project.
#
# The DBT_PROFILES_DIR env-var (set in devcontainer.json) tells dbt to look
# for this file in /workspace rather than ~/.dbt/.
#
# Host is injectable via the DBT_HOST environment variable:
#   DBT_HOST=localhost   (default) — plain `docker run` on the local machine
#   DBT_HOST=db                    — inside the devcontainer (Compose service name)
#
# Other overrides:
#   DBT_PORT      (default: 5432)
#   DBT_USER      (default: postgres)
#   DBT_PASSWORD  (default: postgres)
#   DBT_DBNAME    (default: biditest)

biditest:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DBT_HOST',     'localhost') }}"
      port:     "{{ env_var('DBT_PORT',     '5432') | int }}"
      user:     "{{ env_var('DBT_USER',     'postgres') }}"
      password: "{{ env_var('DBT_PASSWORD', 'postgres') }}"
      dbname:   "{{ env_var('DBT_DBNAME',   'biditest') }}"
      schema: public
      threads: 1
