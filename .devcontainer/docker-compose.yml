services:
  db:
    image: ghcr.io/grove/pg-ripple:0.99.0
    restart: unless-stopped
    environment:
      POSTGRES_DB: biditest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../init:/docker-entrypoint-initdb.d:ro
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biditest"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /workspace

  pg-ripple-http:
    image: ghcr.io/grove/pg-ripple-http:0.99.0
    ports:
      - "7878:7878"
    environment:
      PG_RIPPLE_HTTP_PG_URL: "postgresql://postgres:postgres@db/biditest"
      PG_RIPPLE_HTTP_PORT: "7878"
      PG_RIPPLE_HTTP_POOL_SIZE: "8"
      PG_RIPPLE_HTTP_CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

  pg-tide:
    image: ghcr.io/trickle-labs/pg-tide:0.16.0
    command: ["--postgres-url", "postgres://postgres:postgres@db:5432/biditest"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
